version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codesahayak_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codesahayak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codesahayak_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gurujii:
    build:
      context: ./backend/gurujii-api
      dockerfile: Dockerfile
    container_name: codesahayak_gurujii
    restart: on-failure:5
    environment:
      FLASK_ENV: production
      MODEL_CACHE_DIR: /models
      MAX_TEXT_LENGTH: "500"
      OMP_NUM_THREADS: "2"
    ports:
      - "5000:5000"
    volumes:
      - model_cache:/models
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/gurujii/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codesahayak_backend
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/codesahayak?schema=public"
      JWT_SECRET: "codesahayak-super-secret-key-at-least-32-characters-long"
      JWT_EXPIRES_IN: "7d"
      REDIS_URL: "redis://redis:6379"
      FRONTEND_URL: "http://localhost:5173"
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codesahayak_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  model_cache:
